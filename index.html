<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bharath Singareddy — AI/ML Engineer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@1&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              body: ["Inter", "sans-serif"],
              display: ["Instrument Serif", "serif"],
            },
            colors: {
              bg: "hsl(var(--bg))",
              surface: "hsl(var(--surface))",
              "text-primary": "hsl(var(--text))",
              muted: "hsl(var(--muted))",
              stroke: "hsl(var(--stroke))",
              accent: "hsl(var(--accent))",
            },
            keyframes: {
              "scroll-down": {
                "0%": { transform: "translateY(-100%)" },
                "100%": { transform: "translateY(200%)" },
              },
              "role-fade-in": {
                "0%": { opacity: "0", transform: "translateY(8px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              "gradient-shift": {
                "0%": { backgroundPosition: "0% 50%" },
                "50%": { backgroundPosition: "100% 50%" },
                "100%": { backgroundPosition: "0% 50%" },
              },
            },
            animation: {
              "scroll-down": "scroll-down 1.5s ease-in-out infinite",
              "role-fade-in": "role-fade-in 0.4s ease-out",
              "gradient-shift": "gradient-shift 6s ease infinite",
            },
          },
        },
      };
    </script>

    <style>
      :root {
        --bg: 0 0% 4%;
        --surface: 0 0% 8%;
        --text: 0 0% 96%;
        --muted: 0 0% 53%;
        --stroke: 0 0% 12%;
        --accent: 0 0% 96%;
      }
      * {
        border-color: hsl(var(--stroke));
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: hsl(var(--bg));
        color: hsl(var(--text));
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .accent-gradient {
        background: linear-gradient(90deg, #89aacc 0%, #4e85bf 100%);
      }
      .accent-gradient-animated {
        background: linear-gradient(90deg, #89aacc 0%, #4e85bf 50%, #89aacc 100%);
        background-size: 200% 200%;
      }
      @keyframes scroll-down {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(200%); }
      }
      @keyframes role-fade-in {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animate-scroll-down { animation: scroll-down 1.5s ease-in-out infinite; }
      .animate-role-fade-in { animation: role-fade-in 0.4s ease-out; }
      .animate-gradient-shift { animation: gradient-shift 6s ease infinite; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: hsl(var(--bg)); }
      ::-webkit-scrollbar-thumb { background: hsl(var(--stroke)); border-radius: 4px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <div id="err" style="display:none;position:fixed;inset:0;z-index:99999;background:#0a0a0a;color:#f66;font-family:monospace;font-size:13px;padding:24px;white-space:pre-wrap;overflow:auto"></div>

    <script>
      window.addEventListener("error", function (e) {
        var box = document.getElementById("err");
        if (box) {
          box.style.display = "block";
          box.textContent += "[ERROR] " + (e.message || e.error) + "\n" +
            (e.filename ? e.filename + ":" + e.lineno + ":" + e.colno + "\n" : "");
        }
      });
      window.addEventListener("load", function () {
        var missing = [];
        if (!window.React) missing.push("React");
        if (!window.ReactDOM) missing.push("ReactDOM");
        if (!window.Babel) missing.push("Babel");
        if (!window.gsap) missing.push("gsap");
        if (!window.Hls) missing.push("hls.js");
        if (missing.length) {
          var box = document.getElementById("err");
          box.style.display = "block";
          box.textContent =
            "Failed to load libraries: " + missing.join(", ") +
            "\nCheck your internet connection (this page loads React/GSAP from CDNs).";
        }
      });
    </script>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef } = React;
      gsap.registerPlugin(ScrollTrigger);

      /* ---------------- DATA (from resume) ---------------- */
      const HLS_SOURCE =

      const profile = {

        socials: {

          linkedin: "https://linkedin.com",

      const projects = [

        { title: "Fraud Detection", category: "ML · Anomaly", stack: "XGBoost · Optuna · FastAPI", description: "Engineered 28 features on 0.17% fraud data — 0.985 ROC-AUC, 92% recall — served via FastAPI at <35ms p95.", image: "https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&w=1200&q=80", span: "md:col-span-5", aspect: "aspect-[4/3] md:aspect-[16/10]" },
        { title: "Lane Detection", category: "Computer Vision", stack: "PyTorch · UNet · TensorRT", description: "UNet segmentation on 50k road frames (0.92 IoU), deployed on Jetson Nano with TensorRT at realtime 25 FPS.", image: "https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=1200&q=80", span: "md:col-span-5", aspect: "aspect-[4/3] md:aspect-[16/10]" },
        { title: "Brain Tumor Detection", category: "Deep Learning · Medical", stack: "TensorFlow · CNN · Flask", description: "CNN classifying MRI images for brain tumor detection with high accuracy, deployed via Flask for realtime predictions.", image: "https://images.unsplash.com/photo-1559757175-5700dde675bc?auto=format&fit=crop&w=1200&q=80", span: "md:col-span-7", aspect: "aspect-[4/3] md:aspect-[16/10]" },
        { title: "Medicine Recommender", category: "Recommender · Health", stack: "Flask · PostgreSQL · SHAP", description: "Hybrid recommender (TF-IDF + matrix factorisation) on ICD-10 codes & drug-interaction graphs — improved MAP@10 by 21% with SHAP transparency.", image: "https://images.unsplash.com/photo-1587854692152-cbe660dbde88?auto=format&fit=crop&w=1200&q=80", span: "md:col-span-7", aspect: "aspect-[4/3] md:aspect-[16/10]" },
        { title: "Flappy Bird DQN", category: "Reinforcement Learning", stack: "TensorFlow · DQN · Ray Tune", description: "Deep Q-Network with prioritized replay and reward-shaping reaching 2000+ average score, tuned via Ray Tune sweeps.", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80", span: "md:col-span-5", aspect: "aspect-[4/3] md:aspect-[16/10]" },
      ];

      const journal = [
        { title: "Fine-tuning Transformers at scale", image: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=600&q=80", readTime: "6 min read", date: "Mar 2026" },
        { title: "Taming imbalanced data for fraud", image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=600&q=80", readTime: "5 min read", date: "Feb 2026" },
        { title: "Deploying vision models on the edge", image: "https://images.unsplash.com/photo-1487058792275-0ad4aaf24ca7?auto=format&fit=crop&w=600&q=80", readTime: "8 min read", date: "Jan 2026" },
        { title: "Explainable AI with SHAP & LIME", image: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?auto=format&fit=crop&w=600&q=80", readTime: "4 min read", date: "Dec 2025" },
      ];

      const explorations = [
        "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?auto=format&fit=crop&w=800&q=80",
        "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80",
        "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=800&q=80",
        "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=800&q=80",
        "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80",
        "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80",

      const stats = [
        { value: "10+", label: "Production Models" },

        { value: "150", label: "Req/s Inference" },

      const scrollTo = (sel) =>
        document.querySelector(sel)?.scrollIntoView({ behavior: "smooth" });

      /* ---------------- HLS VIDEO ---------------- */
      function HlsVideo({ src, className }) {
        const ref = useRef(null);
        useEffect(() => {
          const video = ref.current;
          if (!video) return;
          let hls;
          if (window.Hls && window.Hls.isSupported()) {
            hls = new window.Hls({ enableWorker: true });
            hls.loadSource(src);
            hls.attachMedia(video);
          } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = src;
          }
          return () => hls && hls.destroy();
        }, [src]);
        return <video ref={ref} autoPlay muted loop playsInline className={className} />;
      }

      /* ---------------- LOADING SCREEN ---------------- */
      const WORDS = ["Design", "Create", "Inspire"];
      function LoadingScreen({ onComplete }) {
        const [count, setCount] = useState(0);
        const [wi, setWi] = useState(0);
        useEffect(() => {
          let raf, start = performance.now();
          const tick = (now) => {
            const p = Math.min((now - start) / 2700, 1);
            setCount(Math.floor(p * 100));
            if (p < 1) raf = requestAnimationFrame(tick);
            else { setCount(100); setTimeout(onComplete, 400); }
          };
          raf = requestAnimationFrame(tick);
          return () => cancelAnimationFrame(raf);
        }, []);
        useEffect(() => {
          const id = setInterval(() => setWi((i) => (i + 1) % WORDS.length), 900);
          return () => clearInterval(id);
        }, []);
        return (
          <div className="fixed inset-0 z-[9999] bg-bg flex flex-col justify-between p-6 md:p-10" style={{ transition: "opacity .5s" }}>
            <p className="text-xs text-muted uppercase tracking-[0.3em] animate-role-fade-in">Portfolio</p>
            <div className="flex-1 flex items-center justify-center">
              <h2 key={wi} className="text-4xl md:text-6xl lg:text-7xl font-display italic text-text-primary/80 animate-role-fade-in">{WORDS[wi]}</h2>
            </div>
            <div className="flex justify-end">
              <span className="text-6xl md:text-8xl lg:text-9xl font-display text-text-primary tabular-nums">{String(count).padStart(3, "0")}</span>
            </div>
            <div className="absolute bottom-0 left-0 right-0 h-[3px] bg-stroke/50">
              <div className="h-full accent-gradient origin-left" style={{ transform: `scaleX(${count / 100})`, boxShadow: "0 0 8px rgba(137,170,204,.35)" }} />
            </div>
          </div>
        );
      }

      /* ---------------- NAVBAR ---------------- */
      const LINKS = [{ label: "Home", href: "#home" }, { label: "Work", href: "#work" }, { label: "Resume", href: "#stats" }];
      function Navbar() {
        const [scrolled, setScrolled] = useState(false);
        const [active, setActive] = useState("Home");
        useEffect(() => {
          const onScroll = () => setScrolled(window.scrollY > 100);
          window.addEventListener("scroll", onScroll, { passive: true });
          return () => window.removeEventListener("scroll", onScroll);
        }, []);
        const click = (e, href, label) => { e.preventDefault(); setActive(label); scrollTo(href); };
        return (
          <nav className="fixed top-0 left-0 right-0 z-50 flex justify-center pt-4 md:pt-6 px-4">
            <div className={"inline-flex items-center rounded-full backdrop-blur-md border border-white/10 bg-surface px-2 py-2 transition-shadow " + (scrolled ? "shadow-md shadow-black/10" : "")}>
              <a href="#home" onClick={(e) => click(e, "#home", "Home")} className="group relative w-9 h-9 rounded-full p-[1.5px] accent-gradient transition-transform hover:scale-110">
                <span className="flex items-center justify-center w-full h-full rounded-full bg-bg font-display italic text-[13px] text-text-primary">{profile.initials}</span>
              </a>
              <span className="hidden sm:block w-px h-5 bg-stroke mx-1" />
              {LINKS.map((l) => (
                <a key={l.label} href={l.href} onClick={(e) => click(e, l.href, l.label)} className={"text-xs sm:text-sm rounded-full px-3 sm:px-4 py-1.5 sm:py-2 transition-colors " + (active === l.label ? "text-text-primary bg-stroke/50" : "text-muted hover:text-text-primary hover:bg-stroke/50")}>{l.label}</a>
              ))}
              <span className="hidden sm:block w-px h-5 bg-stroke mx-1" />
              <a href="#contact" onClick={(e) => click(e, "#contact", "Contact")} className="group relative rounded-full text-xs sm:text-sm">
                <span className="absolute rounded-full accent-gradient opacity-0 group-hover:opacity-100 transition-opacity" style={{ inset: -2 }} />
                <span className="relative flex items-center gap-1 rounded-full bg-surface backdrop-blur-md px-3 sm:px-4 py-1.5 sm:py-2 text-text-primary">Say hi <span className="text-[10px]">↗</span></span>
              </a>
            </div>
          </nav>
        );

      /* ---------------- HERO ---------------- */
      function Hero() {
        const rootRef = useRef(null);
        const [ri, setRi] = useState(0);
        useEffect(() => {
          const id = setInterval(() => setRi((i) => (i + 1) % profile.roles.length), 2000);
          return () => clearInterval(id);
        }, []);
        useEffect(() => {
          const ctx = gsap.context(() => {
            const tl = gsap.timeline({ defaults: { ease: "power3.out" } });
            tl.fromTo(".name-reveal", { opacity: 0, y: 50 }, { opacity: 1, y: 0, duration: 1.2, delay: 0.1 })
              .fromTo(".blur-in", { opacity: 0, filter: "blur(10px)", y: 20 }, { opacity: 1, filter: "blur(0px)", y: 0, duration: 1, stagger: 0.1 }, 0.3);
          }, rootRef);
          return () => ctx.revert();
        }, []);
        return (
          <section ref={rootRef} id="home" className="relative min-h-screen w-full flex items-center justify-center overflow-hidden">
            <div className="absolute inset-0 overflow-hidden">
              <HlsVideo src={HLS_SOURCE} className="absolute top-1/2 left-1/2 min-w-full min-h-full object-cover -translate-x-1/2 -translate-y-1/2" />
              <div className="absolute inset-0 bg-black/20" />
              <div className="absolute bottom-0 left-0 right-0 h-48 bg-gradient-to-t from-bg to-transparent" />
            </div>
            <Navbar />
            <div className="relative z-10 flex flex-col items-center text-center px-6">
              <p className="blur-in text-xs text-muted uppercase tracking-[0.3em] mb-8">{profile.eyebrow}</p>

              <p className="blur-in text-lg md:text-2xl text-text-primary/90 mb-4">A <span key={ri} className="font-display italic text-text-primary animate-role-fade-in inline-block">{profile.roles[ri]}</span> lives in {profile.location}.</p>
              <p className="blur-in text-sm md:text-base text-muted max-w-md mb-12">{profile.description}</p>
              <div className="blur-in inline-flex gap-4">
                <button onClick={() => scrollTo("#work")} className="group relative rounded-full text-sm px-7 py-3.5 bg-text-primary text-bg transition-all hover:scale-105 hover:bg-bg hover:text-text-primary">
                  <span className="absolute rounded-full accent-gradient opacity-0 group-hover:opacity-100 transition-opacity" style={{ inset: -2, zIndex: -1 }} />See Works
                </button>
                <button onClick={() => scrollTo("#contact")} className="group relative rounded-full text-sm px-7 py-3.5 border-2 border-stroke bg-bg text-text-primary transition-all hover:scale-105 hover:border-transparent">

            </div>
            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-3">
              <span className="text-xs text-muted uppercase tracking-[0.2em]">Scroll</span>
              <div className="w-px h-10 bg-stroke overflow-hidden relative"><div className="absolute inset-x-0 h-1/2 accent-gradient animate-scroll-down" /></div>
            </div>
          </section>
        );
      }

      /* ---------------- SECTION HEADER ---------------- */
      function useReveal() {
        const ref = useRef(null);
        useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const st = ScrollTrigger.create({
            trigger: el, start: "top 85%", once: true,
            onEnter: () => gsap.fromTo(el, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 1, ease: "power2.out" }),
          });
          gsap.set(el, { opacity: 0, y: 30 });
          return () => st.kill();
        }, []);
        return ref;
      }

      function SectionHeader({ eyebrow, title, italicWord, subtext, ctaLabel }) {
        const ref = useReveal();
        return (
          <div ref={ref} className="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-12">
            <div>
              <div className="flex items-center gap-3 mb-4"><span className="w-8 h-px bg-stroke" /><span className="text-xs text-muted uppercase tracking-[0.3em]">{eyebrow}</span></div>
              <h2 className="text-4xl md:text-6xl font-body font-light text-text-primary tracking-tight">{title} <span className="font-display italic">{italicWord}</span></h2>
              <p className="text-sm md:text-base text-muted max-w-md mt-4">{subtext}</p>
            </div>
            {ctaLabel && (
              <button className="group relative hidden md:inline-flex items-center gap-2 rounded-full text-sm px-6 py-3 border border-stroke text-text-primary self-start md:self-auto">
                <span className="absolute rounded-full accent-gradient opacity-0 group-hover:opacity-100 transition-opacity" style={{ inset: -1, zIndex: -1 }} />
                <span className="relative flex items-center gap-2 rounded-full bg-bg px-4 py-1 -mx-4 -my-1">{ctaLabel} <span className="text-xs">→</span></span>
              </button>
            )}
          </div>
        );
      }

      /* ---------------- SELECTED WORKS ---------------- */
      function ProjectCard({ project }) {
        const ref = useRef(null);
        useEffect(() => {
          const el = ref.current;
          const st = ScrollTrigger.create({ trigger: el, start: "top 90%", once: true, onEnter: () => gsap.fromTo(el, { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }) });
          gsap.set(el, { opacity: 0, y: 40 });
          return () => st.kill();
        }, []);
        return (
          <div ref={ref} className={"group relative overflow-hidden bg-surface border border-stroke rounded-3xl " + project.span + " " + project.aspect}>
            <img src={project.image} alt={project.title} loading="lazy" className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
            <div className="absolute inset-0 opacity-20 mix-blend-multiply pointer-events-none" style={{ backgroundImage: "radial-gradient(circle, #000 1px, transparent 1px)", backgroundSize: "4px 4px" }} />
            <div className="absolute top-5 left-5 z-10"><span className="text-[11px] uppercase tracking-[0.2em] text-white/80">{project.category}</span></div>
            <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-bg/70 backdrop-blur-lg opacity-0 group-hover:opacity-100 transition-opacity duration-500 p-6 text-center">
              <div className="relative rounded-full p-[1.5px] accent-gradient-animated animate-gradient-shift"><span className="block rounded-full bg-white text-bg text-sm px-5 py-2">View — <span className="font-display italic">{project.title}</span></span></div>
              <p className="text-xs md:text-sm text-text-primary/80 max-w-xs">{project.description}</p>
              <p className="text-[11px] uppercase tracking-[0.15em] text-muted">{project.stack}</p>
            </div>
          </div>
        );
      }
      function SelectedWorks() {
        return (
          <section id="work" className="bg-bg py-12 md:py-16">
            <div className="max-w-[1200px] mx-auto px-6 md:px-10 lg:px-16">
              <SectionHeader eyebrow="Selected Work" title="Featured" italicWord="projects" subtext="A selection of ML systems I've built, from research to production." ctaLabel="View all work" />
              <div className="grid grid-cols-1 md:grid-cols-12 gap-5 md:gap-6">
                {projects.map((p) => <ProjectCard key={p.title} project={p} />)}
              </div>
            </div>
          </section>
        );
      }

      /* ---------------- JOURNAL ---------------- */
      function Journal() {
        return (
          <section id="journal" className="bg-bg py-16 md:py-24">
            <div className="max-w-[1200px] mx-auto px-6 md:px-10 lg:px-16">
              <SectionHeader eyebrow="Journal" title="Recent" italicWord="thoughts" subtext="Notes on machine learning, MLOps, and shipping models to production." ctaLabel="View all" />
              <div className="flex flex-col gap-4">
                {journal.map((e) => (
                  <a key={e.title} href="#journal" className="group flex items-center gap-4 sm:gap-6 p-4 bg-surface/30 hover:bg-surface border border-stroke rounded-[40px] sm:rounded-full transition-colors">
                    <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-full overflow-hidden flex-shrink-0"><img src={e.image} alt={e.title} loading="lazy" className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" /></div>
                    <div className="flex-1 min-w-0"><h3 className="text-lg sm:text-2xl font-display italic text-text-primary truncate">{e.title}</h3><p className="text-xs text-muted mt-1">{e.readTime}</p></div>
                    <span className="text-xs sm:text-sm text-muted whitespace-nowrap pr-2 sm:pr-6">{e.date}</span>
                  </a>
                ))}
              </div>
            </div>
          </section>
        );
      }

      /* ---------------- EXPLORATIONS ---------------- */
      function Explorations() {
        const sectionRef = useRef(null);
        const contentRef = useRef(null);
        const [lightbox, setLightbox] = useState(null);
        const left = explorations.filter((_, i) => i % 2 === 0);
        const right = explorations.filter((_, i) => i % 2 === 1);
        useEffect(() => {
          const ctx = gsap.context(() => {
            ScrollTrigger.create({ trigger: sectionRef.current, start: "top top", end: "bottom bottom", pin: contentRef.current, pinSpacing: false });
            gsap.to(".parallax-left", { yPercent: -20, ease: "none", scrollTrigger: { trigger: sectionRef.current, start: "top bottom", end: "bottom top", scrub: true } });
            gsap.to(".parallax-right", { yPercent: -45, ease: "none", scrollTrigger: { trigger: sectionRef.current, start: "top bottom", end: "bottom top", scrub: true } });
          }, sectionRef);
          return () => ctx.revert();
        }, []);
        return (
          <section ref={sectionRef} id="explorations" className="relative min-h-[300vh] bg-bg">
            <div ref={contentRef} className="relative z-10 h-screen flex flex-col items-center justify-center text-center px-6 pointer-events-none">
              <div className="flex items-center gap-3 mb-4"><span className="w-8 h-px bg-stroke" /><span className="text-xs text-muted uppercase tracking-[0.3em]">Explorations</span><span className="w-8 h-px bg-stroke" /></div>
              <h2 className="text-4xl md:text-6xl font-body font-light text-text-primary tracking-tight">Visual <span className="font-display italic">playground</span></h2>
              <p className="text-sm md:text-base text-muted max-w-md mt-4">Experiments, visualizations, and side-quests from the research bench.</p>
              <a href={profile.socials.dribbble} target="_blank" rel="noreferrer" className="pointer-events-auto mt-8 rounded-full text-sm px-6 py-3 border border-stroke text-text-primary hover:bg-surface transition-colors">Dribbble ↗</a>
            </div>
            <div className="absolute top-0 left-0 right-0 z-20 px-6">
              <div className="max-w-[1400px] mx-auto grid grid-cols-2 gap-12 md:gap-40 pt-[40vh]">
                <div className="parallax-left flex flex-col gap-16 md:gap-40 items-end">
                  {left.map((src, i) => (
                    <button key={src} onClick={() => setLightbox(src)} className="w-full aspect-square max-w-[320px] overflow-hidden rounded-2xl border border-stroke" style={{ transform: `rotate(${i % 2 === 0 ? -3 : 4}deg)` }}>
                      <img src={src} alt="Exploration" loading="lazy" className="w-full h-full object-cover transition-transform duration-500 hover:scale-105" />
                    </button>
                  ))}
                </div>
                <div className="parallax-right flex flex-col gap-16 md:gap-40 items-start mt-[20vh]">
                  {right.map((src, i) => (
                    <button key={src} onClick={() => setLightbox(src)} className="w-full aspect-square max-w-[320px] overflow-hidden rounded-2xl border border-stroke" style={{ transform: `rotate(${i % 2 === 0 ? 3 : -4}deg)` }}>
                      <img src={src} alt="Exploration" loading="lazy" className="w-full h-full object-cover transition-transform duration-500 hover:scale-105" />
                    </button>
                  ))}
                </div>
              </div>
            </div>
            {lightbox && (
              <div onClick={() => setLightbox(null)} className="fixed inset-0 z-[9998] bg-bg/90 backdrop-blur-md flex items-center justify-center p-6 cursor-zoom-out">
                <img src={lightbox} alt="Exploration" className="max-w-full max-h-full rounded-2xl object-contain" />
              </div>
            )}
          </section>
        );
      }

      /* ---------------- STATS ---------------- */
      function Stats() {
        const ref = useReveal();
        return (
          <section id="stats" className="bg-bg py-16 md:py-24">
            <div className="max-w-[1200px] mx-auto px-6 md:px-10 lg:px-16">
              <div ref={ref} className="grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-6">
                {stats.map((s) => (
                  <div key={s.label} className="flex flex-col items-center md:items-start text-center md:text-left border-t border-stroke pt-6">
                    <span className="text-5xl md:text-7xl font-display italic text-text-primary">{s.value}</span>
                    <span className="text-sm text-muted uppercase tracking-[0.2em] mt-2">{s.label}</span>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      /* ---------------- CONTACT / FOOTER ---------------- */
      const SOCIALS = [
        { label: "Twitter", href: profile.socials.twitter },
        { label: "LinkedIn", href: profile.socials.linkedin },
        { label: "Dribbble", href: profile.socials.dribbble },
        { label: "GitHub", href: profile.socials.github },
      ];
      function Contact() {
        const mq = useRef(null);
        useEffect(() => {
          const ctx = gsap.context(() => {
            gsap.to(".marquee-track", { xPercent: -50, duration: 40, ease: "none", repeat: -1 });
          }, mq);
          return () => ctx.revert();
        }, []);
        return (
          <footer id="contact" className="relative bg-bg pt-16 md:pt-20 pb-8 md:pb-12 overflow-hidden">
            <div className="absolute inset-0 overflow-hidden">
              <HlsVideo src={HLS_SOURCE} className="absolute top-1/2 left-1/2 min-w-full min-h-full object-cover -translate-x-1/2 -translate-y-1/2 scale-y-[-1]" />
              <div className="absolute inset-0 bg-black/60" />
            </div>
            <div ref={mq} className="relative z-10 overflow-hidden mb-16">
              <div className="marquee-track flex whitespace-nowrap will-change-transform">
                {Array.from({ length: 10 }).map((_, i) => (<span key={i} className="text-6xl md:text-8xl font-display italic text-text-primary/80 px-4">BUILDING THE FUTURE • </span>))}
              </div>
            </div>
            <div className="relative z-10 max-w-[1200px] mx-auto px-6 md:px-10 lg:px-16 flex flex-col items-center text-center">
              <p className="text-xs text-muted uppercase tracking-[0.3em] mb-6">Let's build together</p>
              <a href={"mailto:" + profile.email} className="group relative rounded-full text-base md:text-lg px-8 py-4 bg-text-primary text-bg transition-all hover:scale-105 hover:bg-bg hover:text-text-primary">
                <span className="absolute rounded-full accent-gradient opacity-0 group-hover:opacity-100 transition-opacity" style={{ inset: -2, zIndex: -1 }} />{profile.email} ↗
              </a>
              <div className="w-full border-t border-stroke mt-20 pt-8 flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center gap-2">
                  <span className="relative flex h-2.5 w-2.5"><span className="absolute inline-flex h-full w-full animate-ping rounded-full bg-green-400 opacity-75" /><span className="relative inline-flex h-2.5 w-2.5 rounded-full bg-green-400" /></span>
                  <span className="text-sm text-muted">Available for projects</span>
                </div>
                <div className="flex items-center gap-6">{SOCIALS.map((s) => (<a key={s.label} href={s.href} target="_blank" rel="noreferrer" className="text-sm text-muted hover:text-text-primary transition-colors">{s.label}</a>))}</div>
                <span className="text-xs text-muted">© {new Date().getFullYear()} {profile.fullName}</span>
              </div>
            </div>
          </footer>
        );
      }

      /* ---------------- APP ---------------- */
      function App() {
        const [isLoading, setIsLoading] = useState(true);
        return (
          <React.Fragment>
            {isLoading && <LoadingScreen onComplete={() => setIsLoading(false)} />}
            <main style={{ opacity: isLoading ? 0 : 1, transition: "opacity .8s .2s" }}>
              <Hero />
              <SelectedWorks />
              <Journal />
              <Explorations />
              <Stats />
              <Contact />
            </main>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
